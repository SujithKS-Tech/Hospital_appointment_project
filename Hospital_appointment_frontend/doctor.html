<!doctype html>
<html>
  <head>
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h2>Doctor Dashboard</h2>

        <!-- CREATE SCHEDULE -->
        <h3>Create Schedule</h3>
        <input id="date" type="date" />
        <input id="startTime" type="time" />
        <input id="endTime" type="time" />
        <input id="maxAppointments" placeholder="Max Appointments" />

        <button onclick="createSchedule()">Create Schedule</button>

        <!-- VIEW SCHEDULES -->
        <h3>My Schedules</h3>
        <button onclick="loadSchedules()">Load Schedules</button>

        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Start</th>
              <th>End</th>
              <th>Max</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="scheduleTable"></tbody>
        </table>

        <!-- QUEUE -->
        <h3>Queue</h3>
        <input id="queueScheduleId" placeholder="Schedule ID" />
        <button onclick="loadQueue()">View Queue</button>

        <table class="table">
          <thead>
            <tr>
              <th>Queue No</th>
              <th>Patient Name</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="queueTable"></tbody>
        </table>

        <!-- APPOINTMENT CONTROL -->
        <h3>Manage Appointment</h3>
        <input id="appointmentId" placeholder="Appointment ID" />

        <button onclick="startAppointment()">Start</button>
        <button onclick="completeAppointment()">Complete</button>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
