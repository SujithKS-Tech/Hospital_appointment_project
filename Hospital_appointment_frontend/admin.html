<!doctype html>
<html>
  <head>
    <title>Admin</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Admin Panel</h2>

        <input id="dname" placeholder="Doctor Name" />
        <input id="demail" placeholder="Email" />
        <input id="dpassword" placeholder="Password" />
        <input id="dspecialization" placeholder="Specialization" />
        <input id="dphone" placeholder="Phone Number" />
        <input
          id="dexperience"
          placeholder="Experience (years)"
          type="number"
        />
        <input id="dfee" placeholder="Consultation Fee" type="number" />

        <button onclick="createDoctor()">Create Doctor</button>

        <button onclick="loadDoctors()">Load Doctors</button>

        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Specialization</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="doctorTable"></tbody>
        </table>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
